<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slabikátor SK/CZ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 15px; /* Menší padding pre mobily */
        }
        h1 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 20px;
            font-size: 1.5rem; /* Responzívna veľkosť nadpisu */
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 15px; /* Menší padding pre mobily */
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            background: #2a2a2a;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #444;
            flex-wrap: wrap; /* Na mobile sa prepínače zlomia pod seba, ak treba */
        }
        .radio-group {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        input[type="radio"] {
            accent-color: #4CAF50;
            width: 20px; /* Trochu väčšie pre ľahšie ťuknutie prstom */
            height: 20px;
            cursor: pointer;
        }
        .editor-wrapper {
            display: flex;
            border: 1px solid #444;
            border-radius: 6px;
            overflow: hidden;
            background-color: #2d2d2d;
        }
        
        /* Spoločné vlastnosti pre zachovanie výšok */
        textarea, .results {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 16px; /* Zabraňuje iOS zariadeniu automaticky zoomovať po kliknutí */
            line-height: 28px;
            padding: 10px;
            box-sizing: border-box;
            height: 65vh; /* Dynamická výška: zaberie 65 % výšky obrazovky */
            min-height: 300px;
            margin: 0;
            border: none;
        }
        
        textarea {
            flex: 1;
            background-color: transparent;
            color: #e0e0e0;
            resize: none;
            outline: none;
            white-space: pre; /* Text sa nezalamuje, posúva sa horizontálne */
            overflow-x: auto;
            overflow-y: auto;
            /* Plynulé scrollovanie na iOS */
            -webkit-overflow-scrolling: touch; 
        }
        
        .results {
            width: 140px; /* Mierne užšie pre mobil, ale dosť pre text */
            background-color: #222;
            border-left: 1px solid #444;
            overflow: hidden; /* Posúva sa synchronizovane cez JS */
            color: #b0bec5;
        }
        
        .line-result {
            height: 28px;
            display: flex;
            align-items: center;
            padding-left: 8px;
            white-space: nowrap;
            font-size: 14px; /* Čísla môžu byť o kúsok menšie, aby sa zmestil alt */
        }
        
        .highlight {
            background-color: #4a4015;
            color: #fff;
            font-weight: bold;
        }

        /* Špecifické úpravy pre veľmi úzke obrazovky (napr. na výšku) */
        @media (max-width: 480px) {
            body {
                padding: 5px;
            }
            .container {
                padding: 10px;
            }
            .results {
                width: 110px; /* Ešte užší stĺpec pre výsledky */
            }
            .line-result {
                font-size: 12px; /* Zmenšíme písmo pre "alt", aby nevypadlo z okna */
                padding-left: 5px;
            }
            textarea, .results {
                height: 70vh; /* Na malom displeji využijeme viac miesta na výšku */
            }
        }
    </style>
</head>
<body>

    <h1>Slabikátor</h1>
    
    <div class="container">
        <div class="controls">
            <label class="radio-group">
                <input type="radio" name="jazyk" value="sk" checked> Slovenčina
            </label>
            <label class="radio-group">
                <input type="radio" name="jazyk" value="cz"> Čeština
            </label>
        </div>

        <div class="editor-wrapper">
            <textarea id="textInput" spellcheck="false" placeholder="Píš sem...&#10;SK test: Kaliandra spí (ukáže alt)&#10;CZ test: Nepoužívat auto (ukáže alt)"></textarea>
            <div class="results" id="resultOutput"></div>
        </div>
    </div>

    <script>
        const textInput = document.getElementById('textInput');
        const resultOutput = document.getElementById('resultOutput');
        const rJazyk = document.querySelectorAll('input[name="jazyk"]');

        // Podpora pre dotykové scrollovanie na mobiloch
        textInput.addEventListener('scroll', () => {
            resultOutput.scrollTop = textInput.scrollTop;
        });

        textInput.addEventListener('input', spocitajSlabiky);
        
        rJazyk.forEach(radio => {
            radio.addEventListener('change', spocitajSlabiky);
        });

        spocitajSlabiky();

        function spocitajSlabiky() {
            const text = textInput.value;
            const riadky = text.split('\n');
            let vystupHTML = '';
            
            const zvolenyJazyk = document.querySelector('input[name="jazyk"]:checked').value;

            const pravidla = {
                sk: {
                    samohlasky: /[aáäeéiíoóôuúyý]/gi,
                    spoluhlaskyRL: /[rŕlĺ]/gi,
                    vzorRL: /(?<=[bcdfghjklmnpqrstvwxzščťžďňľ])([rŕlĺ])(?=[bcdfghjklmnpqrstvwxzščťžďňľ]|$)/gi,
                    sporne: /(ia|ie|iu)/gi
                },
                cz: {
                    samohlasky: /[aáeéiíoóuúůyýě]/gi,
                    spoluhlaskyRL: /[rl]/gi,
                    vzorRL: /(?<=[bcdfghjklmnpqrstvwxzščřžťďň])([rl])(?=[bcdfghjklmnpqrstvwxzščřžťďň]|$)/gi,
                    sporne: /(ou|au|eu)/gi
                }
            };

            const lang = pravidla[zvolenyJazyk];

            riadky.forEach((riadok) => {
                if (riadok.trim() === '') {
                    vystupHTML += `<div class="line-result">-</div>`;
                    return;
                }

                let pocetZaklad = 0;
                let pocetAlt = 0;
                let spracovanyRiadok = riadok;

                let pocetRL = 0;
                const slova = spracovanyRiadok.split(/[\s,.;!?()"-]+/);
                slova.forEach(slovo => {
                    if (!lang.samohlasky.test(slovo)) {
                        const rl = slovo.match(lang.spoluhlaskyRL);
                        if (rl) pocetRL += rl.length;
                    } else {
                        const rlZlozite = slovo.match(lang.vzorRL);
                        if (rlZlozite) pocetRL += rlZlozite.length;
                    }
                });

                pocetZaklad += pocetRL;
                pocetAlt += pocetRL;

                const sporne = spracovanyRiadok.match(lang.sporne);
                const pocetSpornych = sporne ? sporne.length : 0;
                
                pocetZaklad += pocetSpornych;     
                pocetAlt += (pocetSpornych * 2);  

                spracovanyRiadok = spracovanyRiadok.replace(lang.sporne, '');

                const samohlasky = spracovanyRiadok.match(lang.samohlasky);
                const pocetSamohlasok = samohlasky ? samohlasky.length : 0;

                pocetZaklad += pocetSamohlasok;
                pocetAlt += pocetSamohlasok;

                if (pocetZaklad !== pocetAlt) {
                    vystupHTML += `<div class="line-result highlight">${pocetZaklad} (alt:${pocetAlt})</div>`;
                } else {
                    vystupHTML += `<div class="line-result">${pocetZaklad}</div>`;
                }
            });

            resultOutput.innerHTML = vystupHTML;
        }
    </script>
</body>
</html>
